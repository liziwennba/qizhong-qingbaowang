<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>队伍查询</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <h1>队伍查询</h1>
        <p>输入玩家名，查看队伍武将、红度、等级与携带技能，并支持手动补录新队伍</p>
      </div>
      <div class="meta" id="metaInfo"></div>
      <div class="meta small-meta" id="saveModeInfo"></div>
    </header>

    <section class="search-card">
      <input id="searchInput" type="text" placeholder="输入人名，例如：0号执剑人" autocomplete="off" />
      <button id="searchBtn">查询</button>
    </section>

    <section id="toolbarSection" class="section toolbar-card">
      <div class="toolbar-row">
        <button id="exportBtn" class="secondary-btn">导出当前 player-data.js</button>
        <button id="downloadJsonBtn" class="secondary-btn">导出 JSON 备份</button>
      </div>
      <p class="small toolbar-tip">如果你只是部署在 GitHub Pages，网页不能直接改服务器文件；可以先在本地保存，再导出覆盖仓库文件。若用项目里的本地服务启动，则可直接写回文件永久保存。</p>
      <div id="statusMessage" class="status-message hidden"></div>
    </section>

    <section id="suggestionsSection" class="section hidden">
      <h2>可能是这些人</h2>
      <div id="suggestions" class="chips"></div>
    </section>

    <section id="resultSection" class="section hidden">
      <div class="section-head">
        <div>
          <h2 id="playerName">-</h2>
          <p id="playerStats" class="sub"></p>
        </div>
      </div>

      <div id="editorSection" class="card editor-card hidden">
        <div class="editor-head">
          <div>
            <div class="latest-title">手动添加新队伍</div>
            <p class="sub">选中玩家后可新增一条记录。若本地服务可用，点击保存会直接更新文件；若 Git 已配置好，还可以一键推送到 GitHub。</p>
          </div>
          <div class="save-actions">
          <button id="saveToFileBtn" class="save-btn">保存到文件</button>
          <button id="saveAndPushBtn" class="save-btn secondary-strong-btn">保存并推送 GitHub</button>
        </div>
        </div>
        <form id="addLineupForm" class="editor-form">
          <div class="form-grid meta-grid">
            <label>
              <span>玩家名</span>
              <input id="formPlayerName" type="text" readonly />
            </label>
            <label>
              <span>记录时间</span>
              <input id="formTime" type="datetime-local" required />
            </label>
            <label>
              <span>记录类型</span>
              <input id="formRecordType" type="text" placeholder="例如：手动补录" value="手动补录" />
            </label>
            <label>
              <span>阵容红度</span>
              <input id="formTeamRed" type="text" placeholder="例如：12" />
            </label>
          </div>

          <div class="form-grid">
            <fieldset class="slot-form">
              <legend>大营</legend>
              <input id="mainName" type="text" placeholder="武将名" required />
              <input id="mainRed" type="text" placeholder="红度，例如：5红" />
              <input id="mainLevel" type="text" placeholder="等级，例如：42级" />
              <textarea id="mainSkills" rows="4" placeholder="每行一个技能"></textarea>
            </fieldset>
            <fieldset class="slot-form">
              <legend>中军</legend>
              <input id="middleName" type="text" placeholder="武将名" required />
              <input id="middleRed" type="text" placeholder="红度，例如：2红" />
              <input id="middleLevel" type="text" placeholder="等级，例如：42级" />
              <textarea id="middleSkills" rows="4" placeholder="每行一个技能"></textarea>
            </fieldset>
            <fieldset class="slot-form">
              <legend>前锋</legend>
              <input id="frontName" type="text" placeholder="武将名" required />
              <input id="frontRed" type="text" placeholder="红度，例如：1红" />
              <input id="frontLevel" type="text" placeholder="等级，例如：42级" />
              <textarea id="frontSkills" rows="4" placeholder="每行一个技能"></textarea>
            </fieldset>
          </div>

          <div class="editor-actions">
            <button type="submit">添加到当前玩家</button>
            <button type="button" id="resetFormBtn" class="secondary-btn">清空表单</button>
          </div>
        </form>
      </div>

      <div id="latestCard"></div>
      <div>
        <h3>全部队伍</h3>
        <div id="lineupList" class="lineup-list"></div>
      </div>
      <div>
        <h3>最近记录</h3>
        <div id="recentList" class="recent-list"></div>
      </div>
    </section>

    <section id="emptySection" class="empty">
      <p>还没查询。先输入一个人名试试。</p>
    </section>
  </div>
  <script src="player-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
